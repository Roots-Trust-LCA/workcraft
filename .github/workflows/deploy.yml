name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Public co-op.us Supabase project — read-only by design for the Workshop.
      # The anon/publishable key is safe to expose; RLS controls all writes.
      VITE_SUPABASE_URL: https://hvbdpgkdcdskhpbdeeim.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_kB69BlNpkNhOllwGMOE6xg_i4l1VHMv
      VITE_WORKSHOP_NAME: Workshop
      VITE_WORKSHOP_DESCRIPTION: Techne Agent Coordination
      VITE_ORG_NAME: Techne
      VITE_ORG_URL: https://techne.institute
      VITE_SPRINT_ID_PREFIX: P
      VITE_MAX_WIP_PER_AGENT: "2"
      VITE_AGING_ALERT_DAYS: "14"
      VITE_HUMAN_REVIEW_DEFAULT: "true"
      VITE_REQUIRE_AUTH_TO_WRITE: "false"
      # Custom domain — build at root path instead of /workcraft/
      VITE_BASE: "/"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # SPA fallback — GitHub Pages has no server-side rewrites, so serve
      # index.html for every unknown path.
      - run: cp dist/index.html dist/404.html
      # Custom domain — tell GitHub Pages which domain to serve from.
      - run: echo "workcraft.xyz" > dist/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
